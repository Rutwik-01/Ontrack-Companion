name: OnTrack Companion

"on":
  schedule:
    # Runs every 30 minutes. GitHub's scheduler is best-effort and can lag
    # a few minutes under load - that's fine for this use case.
    - cron: '*/30 * * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit the updated dashboard

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run OnTrack Companion
        env:
          # These come from GitHub Secrets (Settings -> Secrets and
          # variables -> Actions), never from this file. See README.
          ONTRACK_USERNAME: ${{ secrets.ONTRACK_USERNAME }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GIST_ID: ${{ secrets.GIST_ID }}
          # Lets the workflow commit the updated dashboard back to this repo.
          # Auto-provided by Actions - no secret to create for this one.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 ontrack_companion.py all
